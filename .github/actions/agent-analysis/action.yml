name: Agent Analysis (Composite)
description: Run an agenthood member analysis and post findings as a PR comment

inputs:
  agent-name:
    description: Agenthood member name (e.g. the-warden)
    required: true
  prompt-template:
    description: Prompt template for analysis. Use %s for the file list.
    required: true
  pr-number:
    description: Pull request number
    required: true
  range:
    description: Git diff range (base...head). E.g. main...HEAD
    required: true
  api-key:
    description: OPENCODE_API_KEY for agent analysis
    required: false
    default: ""

runs:
  using: composite
  steps:
    - uses: actions/setup-node@v4
      with:
        node-version: "24"
        cache: npm
    - shell: bash
      env:
        RANGE: ${{ inputs.range }}
        OPENCODE_API_KEY: ${{ inputs.api-key }}
        GH_TOKEN: ${{ github.token }}
      run: |
        AGENT_NAME="${{ inputs.agent-name }}"
        PR_NUMBER="${{ inputs.pr-number }}"
        PROMPT_TEMPLATE="${{ inputs.prompt-template }}"

        # Parse range (format: base...head) into base and head SHAs
        # Uses longest suffix removal (%%) to get everything before the last `...`,
        # and shortest prefix removal (#) to get everything after the first `...`.
        BASE_SHA="${RANGE%%...*}"
        HEAD_SHA="${RANGE#*...}"
        [ -z "$HEAD_SHA" ] && HEAD_SHA="$BASE_SHA"

        analysis_file="/tmp/${AGENT_NAME}_analysis.txt"
        error_file="/tmp/${AGENT_NAME}_errors.txt"
        body_file="/tmp/${AGENT_NAME}_body.md"
        > "$error_file"

        if [ -z "$OPENCODE_API_KEY" ]; then
          echo "::notice::OPENCODE_API_KEY not set — skipping $AGENT_NAME agent analysis. Set the secret to enable LLM-based analysis."
          exit 0
        fi

        CHANGED=$(git diff --name-only --diff-filter=ACM "$BASE_SHA" "$HEAD_SHA" 2>/dev/null || echo "")
        if [ -z "$CHANGED" ]; then
          echo "No files changed. Skipping agent analysis."
          exit 0
        fi

        CHANGED=$(echo "$CHANGED" | head -10)

        # Sanitize file names: reject names with shell-special or non-printable characters
        SAFE_CHANGED=$(echo "$CHANGED" | grep -v '[^-_./a-zA-Z0-9]' || true)
        if [ -z "$SAFE_CHANGED" ]; then
          echo "::warning::All changed file names contain special characters — skipping agent analysis."
          exit 0
        fi

        # Validate prompt template contains %s before substitution
        if [[ "$PROMPT_TEMPLATE" != *%s* ]]; then
          echo "::error::prompt-template must contain %s placeholder"
          exit 1
        fi
        TASK="${PROMPT_TEMPLATE//%s/$SAFE_CHANGED}"

        echo "agent-analysis: running $AGENT_NAME on $(echo "$SAFE_CHANGED" | tr '\n' ' ')"

        npm ci && npm run build

        node dist/cli.js run "$AGENT_NAME" "$TASK" --provider opencode-go \
          1> "$analysis_file" \
          2>> "$error_file"

        rc=$?

        {
          NAME_DISPLAY=$(echo "$AGENT_NAME" | sed 's/-/ /g; s/\b\(.\)/\u\1/g')
          echo "## $NAME_DISPLAY -- Analysis"
          echo ""

          if [ -s "$error_file" ]; then
            echo "> **Note:** The analysis encountered issues:"
            echo ">"
            grep -v -iE '(api[_-]?key|token|secret|password|credential)' "$error_file" | sed 's/^/> /' || true
            echo ""
          fi

          if [ -s "$analysis_file" ]; then
            grep -v "^Error running\|^Using \|^opencode-go\|^groq\|^ollama\|^All providers\|^$" "$analysis_file" || true
          fi

          if [ ! -s "$analysis_file" ] && [ ! -s "$error_file" ]; then
            echo "*No analysis output produced.*"
          elif [ ! -s "$analysis_file" ] && [ -s "$error_file" ]; then
            echo ""
            echo "*Agent analysis failed. Review the error details above.*"
          fi
        } > "$body_file"

        if [ -s "$body_file" ]; then
          gh pr comment "$PR_NUMBER" --body-file "$body_file"
        fi

        # Warn on CLI failure, but only fail the step for blocking findings
        if [ "$rc" -ne 0 ]; then
          echo "::warning::${AGENT_NAME} CLI exited with code $rc — analysis may be incomplete"
        fi

        # Check structured decision block from the LLM
        if grep -qE '<!--AGENTHOOD_DECISION:' "$analysis_file" 2>/dev/null; then
          if grep -qE '<!--AGENTHOOD_DECISION:.*blocking=true' "$analysis_file" 2>/dev/null; then
            echo "::error::${AGENT_NAME} found blocking findings — see PR comment for details"
            exit 1
          fi
        else
          echo "::warning::${AGENT_NAME} output missing structured decision block — see PR comment for manual review"
        fi
