# Path-to-label mapping for actions/labeler@v5
# Used by .github/workflows/labeler.yml

docs:
  - changed-files:
    - any-glob-to-any-file:
      - 'docs/**'
      - '*.md'

adr:
  - changed-files:
    - any-glob-to-any-file: 'docs/adr/**'

ci:
  - changed-files:
    - any-glob-to-any-file:
      - '.github/**'
      - '.githooks/**'

test:
  - changed-files:
    - any-glob-to-any-file: 'tests/**'

llm:
  - changed-files:
    - any-glob-to-any-file: 'src/llm/**'

core:
  - changed-files:
    - any-glob-to-any-file: 'src/core/**'

agent:
  - changed-files:
    - any-glob-to-any-file: 'src/agent/**'

skill:
  - changed-files:
    - any-glob-to-any-file: 'src/skills/**'

skills:
  - changed-files:
    - any-glob-to-any-file: 'members/**'

vscode-extension:
  - changed-files:
    - any-glob-to-any-file: 'vscode-extension/**'

dx:
  - changed-files:
    - any-glob-to-any-file:
      - 'src/commands/**'
      - 'src/cli.ts'

chore:
  - changed-files:
    - any-glob-to-any-file: 'scripts/**'

infra:
  - changed-files:
    - any-glob-to-any-file:
      - 'tsconfig.json'
      - 'tsconfig.*.json'
      - '.gitignore'
      - '.nvmrc'
      - 'conventions/**'
