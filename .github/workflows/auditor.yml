name: The Auditor — Secret Scanning

on:
  pull_request:
    branches: [main]
  # push:
  #   branches:
  #     - 'feat/**'
  #     - 'fix/**'
  #     - 'docs/**'
  #     - 'refactor/**'
  #     - 'ci/**'
  #     - 'chore/**'

jobs:
  auditor:
    name: Scan for Secrets (Gitleaks)
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Warn if private repo without license
        if: github.event.repository.private == true
        run: |
          if [ -z "$GITLEAKS_LICENSE" ]; then
            echo "::warning::The Auditor: this is a private repo and GITLEAKS_LICENSE is not set."
            echo "::warning::Gitleaks may not scan correctly. Add a free Starter license from gitleaks.io."
          fi
        env:
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE || '' }}

      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE || '' }}

      - name: The Auditor — post findings to PR
        if: failure() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr comment ${{ github.event.pull_request.number }} \
            --body "## The Auditor — Secret Scan ⚠️

          Potential secrets or configuration issues were detected. Review the [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.

          *— The Auditor, Agenthood*"

      - uses: actions/setup-node@v4
        if: always()
        with:
          node-version: 24
          cache: npm

      - run: npm ci --ignore-scripts
        if: always()

      - run: npm run build
        if: always()

      - name: The Auditor — agent analysis
        if: always()
        continue-on-error: true
        id: auditor-agent
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
        run: |
          CHANGED=$(git diff --name-only --diff-filter=ACM "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}" 2>/dev/null || echo "")
          TASK=$(printf "audit these changed files for security concerns, secrets, and dependency risks:\n%s\n" "$CHANGED")
          node dist/cli.js run the-auditor "$TASK" --provider opencode-go 2>&1 | awk 'NR>1' > /tmp/auditor_agent.txt

      - name: The Auditor — post agent findings
        if: always() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -f /tmp/auditor_agent.txt ] && [ -s /tmp/auditor_agent.txt ]; then
            gh pr comment ${{ github.event.pull_request.number }} \
              --body "## The Auditor — Security Analysis 🔒

$(cat /tmp/auditor_agent.txt)

*— The Auditor, Agenthood*"
          fi
