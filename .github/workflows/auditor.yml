name: The Auditor — Secret Scanning

on:
  pull_request:
    branches: [main]

jobs:
  auditor:
    name: Scan for Secrets (Gitleaks)
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Warn if private repo without license
        if: github.event.repository.private == true
        run: |
          if [ -z "$GITLEAKS_LICENSE" ]; then
            echo "::warning::The Auditor: this is a private repo and GITLEAKS_LICENSE is not set."
            echo "::warning::Gitleaks may not scan correctly. Add a free Starter license from gitleaks.io."
          fi
        env:
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE || '' }}

      - uses: gitleaks/gitleaks-action@dcedce43c6f43de0b836d1fe38946645c9c638dc # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE || '' }}

      - name: The Auditor — post findings to PR
        if: failure() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr comment ${{ github.event.pull_request.number }} \
            --body "## The Auditor — Secret Scan :warning:

          Potential secrets or configuration issues were detected. Review the [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.

          *— The Auditor, Agenthood*"

      - name: The Auditor — agent analysis
        continue-on-error: true
        uses: ./.github/actions/agent-analysis
        with:
          agent-name: the-auditor
          prompt-template: "audit these changed files for security concerns, secrets, and dependency risks:\n%s\n"
          pr-number: ${{ github.event.pull_request.number }}
          base-sha: ${{ github.event.pull_request.base.sha }}
          head-sha: ${{ github.event.pull_request.head.sha }}
          api-key: ${{ secrets.OPENCODE_API_KEY }}
