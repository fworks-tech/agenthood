name: Society — Auto-assign

on:
  issues:
    types: [opened]
  pull_request:
    types: [opened]

permissions:
  issues: write
  pull-requests: write

jobs:
  auto-assign:
    name: The Scribe — assign fworks-tech to new issues and PRs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const isPR = context.eventName === 'pull_request';
            const number = isPR
              ? context.payload.pull_request.number
              : context.payload.issue.number;
            await github.rest.issues.addAssignees({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: number,
              assignees: ['fworks-tech'],
            });
