name: The Doorman — Commit Message Validation

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

jobs:
  commitlint:
    name: Validate Commit Messages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install tsx and commitlint
        run: npm install --save-dev tsx @commitlint/cli @commitlint/config-conventional @commitlint/types

      - name: The Doorman — validate commits in PR range
        env:
          NODE_OPTIONS: "--import tsx"
        run: |
          npx commitlint \
            --config conventions/commitlint.config.ts \
            --from ${{ github.event.pull_request.base.sha }} \
            --to ${{ github.event.pull_request.head.sha }} \
            --verbose
