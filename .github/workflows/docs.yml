name: Deploy Academy Docs

on:
  push:
    branches: [main]
    paths:
      - "docs/academy/**"

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install mkdocs-material
      - run: python -m mkdocs gh-deploy --config-file docs/academy/mkdocs.yml --force
