name: The Herald — CI Summary

on:
  workflow_run:
    workflows:
      - The Auditor — Secret Scanning
      - Society — Auto-assign
      - The Doorman — Commit Message Validation
      - Society — PR Labeler
      - The Librarian — Documentation Sync
      - The Sentinel — Member File Structure
      - The Tester — Test Suite
      - The Envoy — VS Code Extension Build and Test
      - The Warden — File Size Enforcement
    types:
      - completed

permissions:
  pull-requests: write

concurrency:
  group: herald-ci-summary-${{ github.event.workflow_run.head_sha }}
  cancel-in-progress: true

jobs:
  summarize:
    if: github.event.workflow_run.pull_requests[0] != null
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.workflow_run.pull_requests[0];
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const sha = pr.head.sha;
            const shortSha = sha.slice(0, 7);
            const prNumber = pr.number;

            const { data: checkRuns } = await github.rest.checks.listForRef({
              owner,
              repo,
              ref: sha,
            });

            const runs = checkRuns.check_runs;
            const completed = runs.every(r => r.status === 'completed');
            if (!completed) return;

            const rows = runs.map(r => {
              const icon = r.conclusion === 'success' ? '✅' : '❌';
              return `| ${r.name} | ${icon} ${r.conclusion} |`;
            }).join('\n');

            const passed = runs.every(r => r.conclusion === 'success');
            const verdict = passed
              ? 'All trials passed. The PR is cleared for merge.'
              : 'Some trials failed. Review the details above.';
            const summaryEmoji = passed ? '✅' : '❌';

            const body = [
              `## ${summaryEmoji} The Herald's Verdict`,
              '',
              `**PR #${prNumber}** · \`${shortSha}\``,
              '',
              runs.length > 1 ? `All ${runs.length} trials have concluded:` : 'The trial has concluded:',
              '',
              '| Check | Status |',
              '|-------|--------|',
              rows,
              '',
              `**${verdict}**`,
              '',
              '---',
              '<sub>The Herald — CI Summary</sub>',
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number: prNumber,
            });

            if (comments.some(c => c.body.includes("The Herald's Verdict"))) return;

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: prNumber,
              body,
            });
