name: The Herald — CI Summary

on:
  workflow_run:
    workflows:
      - Society — PR Standards
      - The Envoy — VS Code Extension Build and Test
      - The Reviewer — Commit Review
    types:
      - completed

permissions:
  pull-requests: write

concurrency:
  group: herald-ci-summary-${{ github.event.workflow_run.head_sha }}-${{ github.event.workflow_run.workflow }}
  cancel-in-progress: true

jobs:
  summarize:
    if: github.event.workflow_run.pull_requests[0] != null
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea
        with:
          script-path: .github/scripts/herald-summary.js
