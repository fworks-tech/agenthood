name: The Reviewer — Commit Review

on:
  push:
    branches-ignore: [main]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: reviewer-commit-review-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 24
          cache: npm

      - run: npm ci --ignore-scripts

      - run: npm audit --audit-level=high || echo "::warning::npm audit found vulnerabilities"

      - run: npm run build

      - name: Run Reviewer
        id: review
        continue-on-error: true
        run: |
          if [ -z "$OPENCODE_API_KEY" ]; then
            echo "OPENCODE_API_KEY not set. Skipping review."
            exit 0
          fi

          PR_NUMBER=$(gh pr view --json number --jq '.number' 2>/dev/null) || {
            echo "::warning::gh pr view failed — branch may have no open PR"
            PR_NUMBER=""
          }

          if [ -z "$PR_NUMBER" ]; then
            echo "No open PR for this branch. Skipping review."
            exit 0
          fi

          if [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
            RANGE="HEAD"
          else
            RANGE="${{ github.event.before }}..${{ github.event.after }}"
          fi

          DIFF=$(git diff "$RANGE" | head -n 8000)
          if [ -z "$DIFF" ]; then
            echo "No new changes to review."
            exit 0
          fi

          TASK=$(printf "review this git diff. Be concise — use bullet points, keep under 40 lines:\n%s\n\nEnd your report with: <!--AGENTHOOD_DECISION: blocking=true|false warnings=N-->" "$DIFF")
          node dist/cli.js run the-reviewer "$TASK" --provider opencode-go 2>&1 | grep -v "^Error running\|^Using \|^opencode-go\|^groq\|^ollama\|^All providers\|^$" > /tmp/review_body.txt
        env:
          GITHUB_TOKEN: ${{ github.token }}
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}

      - name: Mark previous reviewer comment as outdated
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_NUMBER=$(gh pr view --json number --jq '.number' 2>/dev/null || echo "")
          [ -z "$PR_NUMBER" ] && exit 0
          COMMENT_ID=$(gh api "repos/{owner}/{repo}/issues/$PR_NUMBER/comments" --jq '.[] | select((.body | contains("the-reviewer result:")) and (startswith("> **This analysis is outdated.**") | not)) | .id' 2>/dev/null | tail -1 || true)
          [ -z "$COMMENT_ID" ] && exit 0
          gh api "repos/{owner}/{repo}/issues/comments/$COMMENT_ID" --jq -r '.body' > ${RUNNER_TEMP:-/tmp}/reviewer_stale_body.txt 2>/dev/null || exit 0
          { echo "> **This analysis is outdated.** See the latest comment below for the current review."; echo ">"; cat ${RUNNER_TEMP:-/tmp}/reviewer_stale_body.txt; } | jq -Rs '{body: .}' > ${RUNNER_TEMP:-/tmp}/reviewer_stale_payload.json
          gh api "repos/{owner}/{repo}/issues/comments/$COMMENT_ID" -X PATCH --input ${RUNNER_TEMP:-/tmp}/reviewer_stale_payload.json > /dev/null 2>&1 || true

      - name: Post Review Comment
        run: |
          PR_NUMBER=$(gh pr view --json number --jq '.number' 2>/dev/null) || {
            echo "::warning::gh pr view failed"
            PR_NUMBER=""
          }

          if [ -z "$PR_NUMBER" ]; then
            echo "No open PR. Skipping."
            exit 0
          fi

          if [ ! -f /tmp/review_body.txt ] || [ ! -s /tmp/review_body.txt ]; then
            echo "Review not available. Skipping."
            exit 0
          fi

          jq -Rs '{body: .}' < /tmp/review_body.txt > /tmp/comment.json
          gh api "repos/{owner}/{repo}/issues/${PR_NUMBER}/comments" \
            --input /tmp/comment.json
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Check for Blocking Findings
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ ! -f /tmp/review_body.txt ] || [ ! -s /tmp/review_body.txt ]; then
            echo "No review body available. Skipping blocking check."
            exit 0
          fi
          # Check structured decision block from the LLM
          if grep -qE '<!--AGENTHOOD_DECISION:' /tmp/review_body.txt 2>/dev/null; then
            if ! grep -qE '<!--AGENTHOOD_DECISION:.*blocking=true' /tmp/review_body.txt 2>/dev/null; then
              echo "No blocking findings."
              exit 0
            fi
            PR_NUMBER=$(gh pr view --json number --jq '.number' 2>/dev/null || echo "")
            echo "::error::Blocking findings detected — see Reviewer comment on PR #${PR_NUMBER}."
            exit 1
          else
            echo "::warning::Review output missing structured decision block — see comment for manual review"
            exit 0
          fi
