name: The Scribe — Commit Review

on:
  push:
    branches-ignore: [main]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: scribe-commit-review-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci --ignore-scripts

      - run: npm run build

      - name: Post PR review
        run: |
          PR_NUMBER=$(gh pr view --json number --jq '.number' 2>/dev/null || echo "")

          if [ -z "$PR_NUMBER" ]; then
            echo "No open PR for this branch. Skipping review."
            exit 0
          fi

          if [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
            RANGE="HEAD"
          else
            RANGE="${{ github.event.before }}..${{ github.event.after }}"
          fi

          COMMITS=$(git log "$RANGE" --format="* \`%h\` %s" --reverse)

          if [ -z "$COMMITS" ]; then
            echo "No new commits to review."
            exit 0
          fi

          BODY_FILE=$(mktemp)
          COMMENT_FILE=$(mktemp)

          printf '## Commits Reviewed\n\n' > "$BODY_FILE"
          printf '%s\n' "$COMMITS" >> "$BODY_FILE"
          printf '\n---\n_Generated by agenthood_\n' >> "$BODY_FILE"

          jq -Rs '{body: .}' < "$BODY_FILE" > "$COMMENT_FILE"
          gh api "repos/{owner}/{repo}/issues/${PR_NUMBER}/comments" \
            --input "$COMMENT_FILE"
          rm -f "$BODY_FILE" "$COMMENT_FILE"
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
