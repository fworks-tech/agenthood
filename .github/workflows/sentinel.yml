name: Sentinel — Member File Structure

on:
  pull_request:
    branches: [main]
    paths:
      - 'members/**'
      - 'skills/**'
      - 'AGENTS.md'

jobs:
  sentinel:
    name: Validate Member File Structure
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check member README.md presence
        shell: bash
        run: |
          failed=0
          for dir in members/*/; do
            name=$(basename "$dir")
            [ "$name" = "README.md" ] && continue
            if [ ! -f "${dir}README.md" ]; then
              echo "FAIL [$name]: missing README.md"
              failed=1
            fi
          done
          if [ "$failed" -eq 1 ]; then exit 1; fi
          echo "All members have README.md"

      - name: Validate SKILL.md exists and has frontmatter
        shell: bash
        run: |
          failed=0
          for dir in members/*/; do
            name=$(basename "$dir")
            [ "$name" = "README.md" ] && continue
            skill="${dir}SKILL.md"
            if [ ! -f "$skill" ]; then
              echo "FAIL [$name]: missing SKILL.md"
              failed=1
              continue
            fi
            fm=$(awk '/^---/{count++; if(count==2) exit} count==1' "$skill")
            if ! echo "$fm" | grep -q "^name:"; then
              echo "FAIL [$name]: SKILL.md missing 'name:' in frontmatter"
              failed=1
            fi
            if ! echo "$fm" | grep -q "^description:"; then
              echo "FAIL [$name]: SKILL.md missing 'description:' in frontmatter"
              failed=1
            fi
          done
          if [ "$failed" -eq 1 ]; then exit 1; fi
          echo "All SKILL.md files have valid frontmatter"

      - name: Validate SKILL.md required sections
        shell: bash
        run: |
          failed=0
          sections="## Overview ## When to Use ## Process ## Red Flags ## Rationalizations ## Verification"
          for dir in members/*/; do
            name=$(basename "$dir")
            [ "$name" = "README.md" ] && continue
            skill="${dir}SKILL.md"
            [ ! -f "$skill" ] && continue
            for section in $sections; do
              if ! grep -qF "$section" "$skill"; then
                echo "FAIL [$name]: SKILL.md missing section '$section'"
                failed=1
              fi
            done
          done
          if [ "$failed" -eq 1 ]; then exit 1; fi
          echo "All SKILL.md files have required sections"

      - name: Cross-check member registration in index files
        shell: bash
        run: |
          failed=0
          indexes="AGENTS.md members/README.md README.md"
          for dir in members/*/; do
            name=$(basename "$dir")
            [ "$name" = "README.md" ] && continue
            for idx in $indexes; do
              if ! grep -q "$name" "$idx"; then
                echo "FAIL [$name]: not registered in $idx"
                failed=1
              fi
            done
          done
          if [ "$failed" -eq 1 ]; then exit 1; fi
          echo "All members registered in all index files"

      - name: Verify skills/ reflect members/
        shell: bash
        run: |
          failed=0
          for dir in members/*/; do
            name=$(basename "$dir")
            [ "$name" = "README.md" ] && continue
            member_file="members/$name/SKILL.md"
            skill_file="skills/$name/SKILL.md"
            if [ ! -f "$skill_file" ]; then
              echo "FAIL [$name]: missing file at $skill_file"
              failed=1
            elif ! cmp -s "$member_file" "$skill_file"; then
              echo "FAIL [$name]: $skill_file content differs from $member_file"
              failed=1
            fi
          done
          if [ "$failed" -eq 1 ]; then exit 1; fi
          echo "All skills/ files match members/ content."

      - name: Check for orphan files in skills/
        shell: bash
        run: |
          failed=0
          for dir in skills/*/; do
            name=$(basename "$dir")
            if [ ! -d "members/$name" ]; then
              echo "FAIL [skills/$name]: directory exists but no matching member in members/"
              failed=1
            fi
          done
          if [ "$failed" -eq 1 ]; then exit 1; fi
          echo "No orphan skills/ directories."

      - name: The Sentinel — agent analysis
        continue-on-error: true
        uses: ./.github/actions/agent-analysis
        with:
          agent-name: the-sentinel
          prompt-template: "analyze these changed member files for structural drift and consistency issues:\n%s\n"
          pr-number: ${{ github.event.pull_request.number }}
          base-sha: ${{ github.event.pull_request.base.sha }}
          head-sha: ${{ github.event.pull_request.head.sha }}
          api-key: ${{ secrets.OPENCODE_API_KEY }}
          github-token: ${{ github.token }}
