name: Sentinel — Member File Structure

on:
  pull_request:
    branches: [main]
    paths:
      - 'members/**'
      - 'skills/**'
      - 'AGENTS.md'

jobs:
  sentinel:
    name: Validate Member File Structure
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: The Sentinel — audit member structure
        shell: bash
        run: |
          FAILED=0

          check_section() {
            local skill_file="$1"
            local name="$2"
            local section="$3"
            if ! grep -qF "^$section" "$skill_file" && ! grep -qF "$section" "$skill_file"; then
              echo "FAIL [$name]: missing section '$section' in skill file"
              return 1
            fi
            return 0
          }

          for MEMBER_DIR in members/*/; do
            NAME=$(basename "$MEMBER_DIR")

            [ "$NAME" = "README.md" ] && continue

            if [ ! -f "${MEMBER_DIR}README.md" ]; then
              echo "FAIL [$NAME]: missing README.md"
              FAILED=1
            fi

            SKILL_FILE="${MEMBER_DIR}SKILL.md"
            if [ ! -f "$SKILL_FILE" ]; then
              echo "FAIL [$NAME]: missing adopter-facing skill file $SKILL_FILE"
              FAILED=1
              continue
            fi

            FM=$(awk '/^---/{count++; if(count==2) exit} count==1' "$SKILL_FILE")

            if ! echo "$FM" | grep -q "^name:"; then
              echo "FAIL [$NAME]: SKILL.md missing 'name:' in frontmatter"
              FAILED=1
            fi

            if ! echo "$FM" | grep -q "^description:"; then
              echo "FAIL [$NAME]: SKILL.md missing 'description:' in frontmatter"
              FAILED=1
            fi

            for SECTION in "## Overview" "## When to Use" "## Process" "## Red Flags" "## Rationalizations" "## Verification"; do
              if ! grep -qF "$SECTION" "$SKILL_FILE"; then
                echo "FAIL [$NAME]: SKILL.md missing section '$SECTION'"
                FAILED=1
              fi
            done
          done

          # Cross-check: every member directory must be registered in all three indexes
          for MEMBER_DIR in members/*/; do
            NAME=$(basename "$MEMBER_DIR")
            [ "$NAME" = "README.md" ] && continue

            if ! grep -q "$NAME" AGENTS.md; then
              echo "FAIL [$NAME]: not registered in AGENTS.md"
              FAILED=1
            fi

            if ! grep -q "$NAME" members/README.md; then
              echo "FAIL [$NAME]: not registered in members/README.md"
              FAILED=1
            fi

            if ! grep -q "$NAME" README.md; then
              echo "FAIL [$NAME]: not registered in README.md"
              FAILED=1
            fi
          done

          if [ "$FAILED" -eq 1 ]; then
            echo ""
            echo "The Sentinel found structural violations. All members must conform."
            exit 1
          fi

          echo "The Sentinel: all members structurally sound."

      - name: The Sentinel — verify skills/ reflect members/
        shell: bash
        run: |
          FAILED=0

          # Check: every member has a corresponding file in skills/ with matching content
          for MEMBER_DIR in members/*/; do
            NAME=$(basename "$MEMBER_DIR")
            [ "$NAME" = "README.md" ] && continue

            MEMBER_FILE="members/$NAME/SKILL.md"
            SKILL_FILE="skills/$NAME/SKILL.md"

            if [ ! -f "$SKILL_FILE" ]; then
              echo "FAIL [$NAME]: missing file at $SKILL_FILE"
              FAILED=1
            elif ! cmp -s "$MEMBER_FILE" "$SKILL_FILE"; then
              echo "FAIL [$NAME]: $SKILL_FILE content differs from $MEMBER_FILE"
              FAILED=1
            fi
          done

          # Check: no orphan files in skills/ (member no longer exists)
          for SKILL_DIR in skills/*/; do
            NAME=$(basename "$SKILL_DIR")
            if [ ! -d "members/$NAME" ]; then
              echo "FAIL [skills/$NAME]: directory exists but no matching member in members/"
              FAILED=1
            fi
          done

          if [ "$FAILED" -eq 1 ]; then
            echo ""
            echo "The Sentinel: skills/ are out of sync with members/. Sync before merging."
            exit 1
          fi

          echo "The Sentinel: all skills/ files match members/."

      - uses: actions/setup-node@v4
        if: always()
        with:
          node-version: 24
          cache: npm

      - run: npm ci --ignore-scripts
        if: always()

      - run: npm run build
        if: always()

      - name: The Sentinel — agent analysis
        if: always()
        continue-on-error: true
        id: sentinel-agent
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
        run: |
          CHANGED=$(git diff --name-only --diff-filter=ACM "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}" 2>/dev/null || echo "")
          TASK=$(printf "analyze these changed member files for structural drift and consistency issues:\n%s\n" "$CHANGED")
          node dist/cli.js run the-sentinel "$TASK" --provider opencode-go 2>&1 | awk 'NR>1' > /tmp/sentinel_agent.txt

      - name: The Sentinel — post agent findings
        if: always() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -f /tmp/sentinel_agent.txt ] && [ -s /tmp/sentinel_agent.txt ]; then
            gh pr comment ${{ github.event.pull_request.number }} \
              --body "## The Sentinel — Agent Analysis 🔍

$(cat /tmp/sentinel_agent.txt)

*— The Sentinel, Agenthood*"
          fi
