name: Tester — Test Suite

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  tester:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: The Tester — run test suite
        run: npm test
